<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
    <title id="title">CV HRIS Internal Employee CV Icon</title>
    <desc id="desc">A teal app icon showing an employee CV document, internal identity badge, and verification check.</desc>
    <defs>
        <linearGradient id="bg" x1="86" y1="52" x2="426" y2="462" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#0f766e"/>
            <stop offset="1" stop-color="#115e59"/>
        </linearGradient>
        <linearGradient id="paper" x1="154" y1="92" x2="346" y2="405" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#f8fafc"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
            <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity=".18"/>
        </filter>
    </defs>

    <rect width="512" height="512" rx="112" fill="url(#bg)"/>
    <path d="M86 396c68 30 136 45 204 45 52 0 98-9 136-26v40c0 31-25 56-56 56H142c-31 0-56-25-56-56v-59z" fill="#0f172a" opacity=".08"/>

