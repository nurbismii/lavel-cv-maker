        <path d="M305 76v58c0 17 14 31 31 31h43l-74-89z" fill="#d1fae5"/>
        <path d="M305 76v58c0 17 14 31 31 31h43" fill="none" stroke="#99f6e4" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <rect x="154" y="196" width="186" height="20" rx="10" fill="#0f766e"/>
    <rect x="154" y="235" width="132" height="16" rx="8" fill="#94a3b8"/>
    <rect x="154" y="268" width="172" height="16" rx="8" fill="#cbd5e1"/>
